# Render.com Blueprint
# https://render.com/docs/blueprint-spec
#
# Render dashboard deer "New +" -> "Blueprint" songood
# energiin git repo-g zaaval, dor jagsaagdsan service uud avtomataar uusgegden.
#
# Frontend Vercel deer deploy hiidg uchir und bguigui — zugeer backend + DB.

databases:
  - name: buriad-huvtsas-db
    plan: free
    databaseName: buriad_huvtsas
    user: buriad_user

services:
  - type: web
    name: buriad-huvtsas-api
    runtime: node
    plan: free
    rootDir: backend
    region: singapore
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: buriad-huvtsas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false  # Vercel domain-iig dashboard-aas zaagaarai
      - key: SERVER_URL
        sync: false  # Render service URL (https://buriad-huvtsas-api.onrender.com)
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: QPAY_BASE_URL
        value: https://merchant-sandbox.qpay.mn/v2
      - key: QPAY_CLIENT_ID
        sync: false
      - key: QPAY_CLIENT_SECRET
        sync: false
      - key: QPAY_INVOICE_CODE
        sync: false
      - key: TRYON_SPACE
        value: yisol/IDM-VTON
      - key: TRYON_STEPS
        value: "30"
      - key: TRYON_SEED
        value: "42"
      - key: JSON_BODY_LIMIT
        value: 15mb
